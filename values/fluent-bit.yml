kind: DaemonSet

# This configuration is based on the default fluent-bit config
# See https://github.com/fluent/helm-charts/blob/2918866efb1cf41ddf9708090ffdc6e3cc915767/charts/fluent-bit/values.yaml#L382
config:
  service: |
    [SERVICE]
        Daemon Off
        Flush {{ .Values.flush }}
        Log_Level {{ .Values.logLevel }}
        Parsers_File /fluent-bit/etc/parsers.conf
        Parsers_File /fluent-bit/etc/conf/custom_parsers.conf
        HTTP_Server On
        HTTP_Listen 0.0.0.0
        HTTP_Port {{ .Values.metricsPort }}
        Health_Check On

  ## https://docs.fluentbit.io/manual/pipeline/inputs
  inputs: |
    [INPUT]
        Name tail
        Path /var/log/containers/*log-generator*.log
        multiline.parser docker, cri
        Tag kube.*
        refresh_interval 10
        Skip_Long_Lines On

  ## https://docs.fluentbit.io/manual/pipeline/filters
  filters: |
    [FILTER]
        Name kubernetes
        Match kube.*
        Merge_Log On
        Keep_Log Off
        K8S-Logging.Parser Off
        K8S-Logging.Exclude On

  ## https://docs.fluentbit.io/manual/pipeline/outputs
  outputs: |
    [OUTPUT]
        Name http
        Match kube.*
        host log-verifier.monitoring.svc.cluster.local.
        port 8080
        compress gzip
        uri /insert/jsonline
        format json_lines
        header VL-Extra-Fields collector=fluentbit
        header VL-Stream-Fields collector,kubernetes.pod_name

  ## https://docs.fluentbit.io/manual/pipeline/parsers
  customParsers: |
    [PARSER]
        Name docker_no_time
        Format json
        Time_Keep Off
        Time_Key time
        Time_Format %Y-%m-%dT%H:%M:%S.%L

serviceAccount:
  create: true
rbac:
  create: true

resources:
  requests:
    cpu: '1'
    memory: '1Gi'
  limits:
    cpu: '1'
    memory: '1Gi'

extraVolumes: [ ]
extraVolumeMounts: [ ]

volumeMounts:
  - name: config
    mountPath: /fluent-bit/etc/conf

daemonSetVolumes:
  - name: varlog
    hostPath:
      path: /var/log
  - name: varlibdockercontainers
    hostPath:
      path: /var/lib/docker/containers

daemonSetVolumeMounts:
  - name: varlog
    mountPath: /var/log

command:
  - /fluent-bit/bin/fluent-bit

args:
  - --workdir=/fluent-bit/etc
  - --config=/fluent-bit/etc/conf/fluent-bit.conf

initContainers: []

logLevel: info
