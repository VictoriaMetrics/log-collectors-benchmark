          "description": "Total number of lost logs per collector, calculated as the difference between \nthe expected log count (max sequence_id) and the actual delivered count. \nAggregated across all log_generator_pod instances.\n\nOnly successfully parsed logs are counted. Logs dropped due to being malformed are not included in this metric - see the \"Malformed logs (total)\" panel for details.",
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "",
                "axisPlacement": "auto",
                "barAlignment": 0,
