        {
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "description": "How many logs each collector is behind the fastest collector for the same generator Pod.\nCalculated as:\n\nmax(seq_id across all collectors) - collector's current seq_id.\n\nA growing value means the collector is falling behind the generation rate.\nA low value means either the collector is keeping up, or it is dropping logs\nand advancing seq_id without actually delivering them.\nCheck \"Log loss by collector (total)\" to distinguish between the two cases.",
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "barWidthFactor": 0.6,
                "drawStyle": "line",
                "fillOpacity": 0,
                "gradientMode": "none",
                "hideFrom": {
                  "legend": false,
                  "tooltip": false,
                  "viz": false
                },
                "insertNulls": false,
