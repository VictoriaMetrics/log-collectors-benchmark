          "pluginVersion": "12.3.3",
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
              },
              "editorMode": "code",
              "expr": "# Sequence lag: how many logs each collector is behind the fastest collector for the same generator pod. \n# If vlagent is at seq 10000 and vector is at 500,\n# vector's lag is 9500.\nsum by (collector) (\n    # For each generator pod, find the maximum seq_id across all collectors.\n    max by (log_generator_pod) (log_verifier_max_sequence_id)\n    - on(log_generator_pod) group_right()\n    max by (log_generator_pod, collector) (log_verifier_max_sequence_id)\n)",
              "interval": "30s",
              "legendFormat": "__auto",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Delivery lag",
          "type": "timeseries"
        },
