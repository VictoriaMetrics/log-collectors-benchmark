            "enable": true,
            "hide": false,
            "iconColor": "super-light-blue",
            "mappings": {},
            "name": "generators_count_changed",
            "target": {
              "expr": "changes(sum(kube_pod_info{namespace=\"log-generator\"} or vector(0))) > 0",
              "interval": "",
              "refId": "Anno"
            },
            "titleFormat": "Generator Pod count changed"
          },
          {
            "builtIn": 1,
            "datasource": {
              "type": "datasource",
              "uid": "grafana"
            },
            "enable": false,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "target": {
              "limit": 100,
              "matchAny": false,
              "tags": [],
              "type": "dashboard"
            },
            "type": "dashboard"
          }
        ]
