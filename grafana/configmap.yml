          "description": "Cumulative count of logs received by the verifier with missing required fields:\nsequence_id, generated_at, or Pod name.\nA non-zero value indicates that the collector is capable of delivering malformed logs.\n\nCommon causes: CPU throttling, improper log rotation handling, or incorrect Pod metadata caching.",
